<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2b7a78" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Private Expense Viewer</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Private Expense</h1>
    <div class="header-actions">
      <div class="month-switch">
        <label for="month-select" class="visually-hidden">対象月</label>
        <select id="month-select" aria-label="対象月"></select>
      </div>
      <button class="icon-btn" id="settings-btn" type="button" aria-label="設定">⚙</button>
    </div>
  </header>

  <main class="app-main">
    <section class="summary-section" aria-labelledby="summary-heading">
      <h2 id="summary-heading" class="visually-hidden">月次サマリー</h2>
      <p class="summary-label" id="summary-label">全期間</p>
      <p class="summary-total" id="summary-total">¥0</p>
      <div class="summary-breakdown">
        <span class="summary-food">食品 <b id="summary-food">¥0</b></span>
        <span class="summary-nonfood">食品以外 <b id="summary-nonfood">¥0</b></span>
      </div>
    </section>

    <section class="charts-section" aria-labelledby="charts-heading">
      <h2 id="charts-heading" class="section-heading">カテゴリ別内訳</h2>
      <div class="chart-card">
        <h3 class="chart-title">食品系</h3>
        <div class="chart-wrapper">
          <canvas id="chart-food" role="img" aria-label="食品カテゴリ別支出の円グラフ"></canvas>
          <div class="chart-center" id="chart-food-center"></div>
        </div>
        <ul class="legend" id="legend-food"></ul>
      </div>
      <div class="chart-card">
        <h3 class="chart-title">食品以外</h3>
        <div class="chart-wrapper">
          <canvas id="chart-nonfood" role="img" aria-label="食品以外カテゴリ別支出の円グラフ"></canvas>
          <div class="chart-center" id="chart-nonfood-center"></div>
        </div>
        <ul class="legend" id="legend-nonfood"></ul>
      </div>
    </section>

    <section class="list-section" aria-labelledby="list-heading">
      <h2 id="list-heading" class="section-heading">商品一覧</h2>
      <div class="view-tabs" role="tablist" aria-label="表示切替">
        <button class="tab-btn is-active" role="tab" aria-selected="true" data-view="items" id="tab-items">商品別</button>
        <button class="tab-btn" role="tab" aria-selected="false" data-view="receipts" id="tab-receipts">レシート別</button>
      </div>
      <div id="list-container" class="list-container" role="tabpanel" aria-labelledby="tab-items"></div>
      <p id="empty-state" class="empty-state" hidden>データがありません。下の「📷 撮影」か「CSVインポート」からデータを追加してください。</p>
    </section>
  </main>

  <div class="modal-container" id="capture-modal" role="dialog" aria-modal="true" hidden></div>
  <div class="modal-container" id="settings-modal" role="dialog" aria-modal="true" hidden></div>

  <footer class="app-footer">
    <label class="btn btn-primary" for="camera-input">
      📷 撮影
      <input id="camera-input" type="file" accept="image/*" capture="environment" hidden />
    </label>
    <label class="btn" for="import-input">
      CSV
      <input id="import-input" type="file" accept=".csv,text/csv" hidden />
    </label>
    <button class="btn" id="export-btn" type="button">書出</button>
    <button class="btn btn-danger" id="clear-btn" type="button">全削除</button>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
